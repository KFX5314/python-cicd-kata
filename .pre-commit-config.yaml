repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.4.0  # Especifica la versión del hook
  hooks:
  - id: trailing-whitespace  # Elimina espacios en blanco al final
  - id: end-of-file-fixer   # Asegura que el archivo termine con una línea nueva
  - id: check-yaml          # Verifica la sintaxis YAML
  - id: check-json          # Verifica la sintaxis JSON
  - id: check-case-conflict

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.9
  hooks:
  - id: ruff-check
    name: ruff lint
    args: [ --fix ]
  - id: ruff-format
    name: ruff format
    entry: ruff format --force-exclude
    language: python
    types: [python]
    args: []
    require_serial: true
    additional_dependencies: []
    minimum_pre_commit_version: "2.9.2"

- repo: local
  hooks:
  - id: static-type-check
    name: Static Type Check
    entry: uv run pyright
    language: python
  - id: test
    name: Run Tests
    entry: uv run pytest
    language: python
